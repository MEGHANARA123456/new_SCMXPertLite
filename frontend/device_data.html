<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Device Data Stream</title>

<style>
* {
  transition: all 0.25s ease;
}

/* Fade-in effect for cards & table rows */
.card, .table tr {
  animation: fadeIn 0.6s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Hover lift animation for cards */
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0px 10px 28px rgba(0,0,0,0.12);
}

* { transition: all 0.25s ease; }

.card, .table tr { animation: fadeIn 0.6s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0px 10px 28px rgba(0,0,0,0.12);
}

/* ===== TOPBAR ===== */
.topbar {
  width: 100%;
  background: linear-gradient(90deg, #6C27D9, #9c4dff);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 10;

/* ===== NEW FIX (ONLY ADD) ===== */
.topbar > div {
  display: flex;
  align-items: center;
  width: 100%;
}

.brand {
  display:flex;
  align-items:center;
  color:#fff;

}

.brand span { font-weight:600; }

.nav-left a {
  color: rgba(255,255,255,0.9);
  text-decoration: none;

  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.25);
}

.nav-right { display:flex; align-items:center; margin-left:auto; }

/* ===== PROFILE ===== */
.profile-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 8px;
}

.avatar {

  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}

.username { color:#fff; }

.dropdown {
  display:none;
  position:absolute;

  right:0;
  background:#fff;

  min-width:220px;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);
}

.profile-wrap.open .dropdown { display:block; }

.drop-item {
  display:block;
  padding:10px 16px;
  text-decoration:none;
  color:#222;
}

.drop-item:hover { background:#f5f5f5; }

/* ===== TABLE ===== */
.table { width:100%; border-collapse:collapse; }
.table th, .table td { padding:12px; border-bottom:1px solid #eee; }

.card {
  border-radius: 18px;
  padding: 24px;
  background: #ffffff;
  box-shadow: 0px 6px 18px rgba(0,0,0,0.08);
}

/* ===== TOP NAVIGATION ===== */
.topbar {
  width: 100%;
  background: linear-gradient(90deg, #6C27D9, #9c4dff);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

.nav-menu {
  display: flex;
  gap: 35px;
  justify-content: center;
  font-size: 18px;
}

.nav-menu a {
  text-decoration: none;

}

/* ===== INPUT FIELDS ===== */
#deviceForm .input,

  border: 2px solid #b9b9b9;
  border-radius: 8px;
  padding: 10px;
  font-size: 15px;

  border-color: #00aaff;
  box-shadow: 0 0 8px rgba(0,170,255,0.4);

}

/* ===== BUTTON ===== */
#deviceForm .btn-primary {
  background: linear-gradient(90deg, #03A9F4, #0288D1);
  border: none;
  border-radius: 10px;
  padding: 12px 26px;
  color: white;
  font-weight: 600;
  letter-spacing: 0.4px;

}

#deviceForm .btn-primary:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0px 8px 18px rgba(3,169,244,0.4);
}

/* ===== TABLE STYLING ===== */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

.table th {
  background: linear-gradient(90deg, #e8f1ff, #f0f7ff);
  padding: 12px;
  text-align: left;
  font-weight: 700;
  border-bottom: 2px solid #d7d7d7;
  color: #333;
}

.table td {
  padding: 12px;
  border-bottom: 1px solid #ececec;
  color: #444;
}

/* row hover glow */
.table tr:hover {
  background: #f0f6ff;
  box-shadow: inset 0 0 8px rgba(0,150,255,0.1);
  transform: scale(1.01);
}

/* ===== CARDS ===== */
.card {
  border-radius: 18px;
  padding: 24px;
  background: #ffffff;
  box-shadow: 0px 6px 18px rgba(0,0,0,0.08);
}

/* top card styling */
.card[style*="background: #a7dfff"] {
  background: linear-gradient(180deg, #a7dfff, #d5f0ff) !important;
  border-radius: 18px;
  box-shadow: 0px 8px 22px rgba(0,0,0,0.1);
}

/* Titles */
.container h2 {
  color: #222;
  font-weight: 700;
  animation: fadeIn 0.8s ease;
}

/* Responsive */
@media (max-width: 768px) {
  #deviceForm .grid {
    flex-direction: column !important;
    gap: 14px !important;
  }

  #deviceForm .field {
    width: 100% !important;
  }
}

.nav-left a {
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  font-size: 14px;
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.25);
  transition: background 0.15s;
}
.nav-left a:hover { background: rgba(255,255,255,0.15); }

.nav-right { display: flex; align-items: center; }

/* Profile trigger */
.profile-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 8px;
  transition: background 0.15s;
  user-select: none;
}
.profile-wrap:hover { background: rgba(255,255,255,0.15); }

.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; color: #fff;
  border: 2px solid rgba(255,255,255,0.5);
}
.username { font-size: 14px; color: #fff; font-weight: 500; }
.arrow { font-size: 10px; color: rgba(255,255,255,0.8); transition: transform 0.2s; }
.profile-wrap.open .arrow { transform: rotate(180deg); }

/* Dropdown */
.dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #fff;
  border: 0.5px solid #e0e0e0;
  border-radius: 14px;
  min-width: 230px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  z-index: 9999;
  overflow: hidden;
}
.profile-wrap.open .dropdown { display: block; }

/* Dropdown header */
.drop-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
}
.drop-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #7c5cbf;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.drop-name { font-size: 15px; font-weight: 600; color: #111; }
.drop-meta { font-size: 12px; color: #888; margin-top: 2px; }
.drop-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #2e7d32; font-weight: 500; margin-top: 3px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4caf50;
  display: inline-block;
}

/* Section labels */
.drop-section-label {
  font-size: 11px;
  font-weight: 600;
  color: #aaa;
  letter-spacing: 0.6px;
  padding: 6px 16px 2px;
}

/* Items */
.drop-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  font-size: 14px;
  color: #222;
  text-decoration: none;
  transition: background 0.12s;
}
.drop-item:hover { background: #f5f5f5; }

/* Icon circles */
.drop-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.purple-icon { background: #ede9fb; color: #7c5cbf; }
.gray-icon   { background: #f0f0f0; color: #666; }
.orange-icon { background: #fff3e0; color: #e65100; }
.blue-icon   { background: #e3f2fd; color: #1565c0; }
.teal-icon   { background: #e0f2f1; color: #00695c; }
.pink-icon   { background: #fce4ec; color: #c2185b; }
.red-icon    { background: #fdecea; color: #c62828; }

.logout-item { color: #c62828; }
.logout-item:hover { background: #fdecea; }

.drop-divider {
  height: 0.5px;
  background: #eeeeee;
  margin: 4px 0;

</style>

</head>

<body>


<header class="topbar">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;width:100%;gap:18px;">

    <!-- BRAND -->
    <div class="brand">
      <strong>SCMXPert<span style="color:#45e4ff">Lite</span></strong>
      <span style="opacity:.8;font-size:13px;margin-left:6px">Admin</span>
    </div>

    <!-- LEFT -->
    <nav class="nav-left" style="margin-left:20px;">
      <a href="/frontend/shipment_data.html">+ Create Shipment</a>
    </nav>

    <!-- RIGHT -->
    <nav class="nav-right">
      <div class="profile-wrap" id="profileWrap">
        <div class="avatar" id="userAvatar">?</div>
        <span class="username" id="usernameDisplay">Loading...</span>
        <span>▼</span>

        <!-- SINGLE DROPDOWN -->
        <div class="dropdown" id="profileDropdown">
          <a href="/frontend/admin_dashboard.html" id="adminLink" class="drop-item" style="display:none">Admin Panel</a>
        </div>
      </div>
    </nav>

  </div>
</header>

<div class="container">

  <h2 style="text-align:center; font-weight:700; margin-top:10px;">
    Device Data Stream
  </h2>

  <!-- Top card -->
  <div class="card" style="margin-top:24px; background: #a7dfff; padding:40px; text-align:center;">

    <h3 style="margin-top:0; font-weight:600;">
      Please Enter a Device Id to See the Data Stream
    </h3>

    <form id="deviceForm" style="margin-top:20px;">
      <div class="grid cols-2" style="display:flex; gap:20px; justify-content:center; align-items:center;">

        <!--  Manual Input Instead of Dropdown -->
        <div class="field" style="width:250px; margin:auto;">
          <label>Device Id*</label>
          <input type="text" id="device_id" class="input" placeholder="Enter Device ID or leave blank to view recent" >
        </div>

        <!-- Submit Button -->
        <div style="margin:auto;">
          <button type="submit" class="btn btn-primary" style="padding:12px 26px; font-size:14px;">
            GET DEVICE DATA
          </button>
        </div>

      </div>
    </form>

  </div>

  <!-- Data table -->
  <div class="card" style="margin-top:26px;">
    <table class="table">
      <thead>
        <tr>
          <th>Device Id</th>
          <th>Battery Level</th>
          <th>Temperature</th>
          <th>Route From</th>
          <th>Route To</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="streamData">
        <tr><td colspan="6" style="text-align:center;" class="small">No data loaded</td></tr>
      </tbody>
    </table>
  </div>

</div>
<div class="dropdown" id="profileDropdown">
  <a href="/frontend/dashboard.html"><span class="icon">⊞</span> Dashboard</a>

  <!-- Hidden by default, shown only for admins by JS -->
  <a href="/frontend/admin_dashboard.html" id="adminLink" style="display:none">
    <span class="icon">⚙</span> Admin panel
  </a>

  <a href="/frontend/profile.html"><span class="icon">◯</span> Profile</a>
  <div class="divider"></div>
  <a href="/frontend/logout.html" class="logout-link"><span class="icon">→</span> Logout</a>
</div>
<script>
  //  If no token, redirect to signin immediately
  (function() {
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.replace("/frontend/user.html");
    }
  })();
const API_URL = `${location.protocol}//${location.hostname}:8000`;
let selectedDevice = null;
let autoRefreshTimer = null;

// Helper: show a friendly row message
function showMessage(msg) {
    const tbody = document.getElementById("streamData");
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;" class="small">${msg}</td></tr>`;
}

// Format timestamp (fallback to raw if invalid)
function formatTimestamp(ts) {
    try {
        const d = new Date(ts);
        if (isNaN(d)) return ts || "";
        return d.toLocaleString();
    } catch { return ts || ""; }
}

// ------------------------
// FIXED WORKING loadStream()
// ------------------------
async function loadStream() {
    const tbody = document.getElementById("streamData");
    tbody.innerHTML = "";
    showMessage("Loading...");

    // SELECT ENDPOINT CORRECTLY
    let endpoint;
    if (selectedDevice) {
        endpoint = `${API_URL}/device-data/${selectedDevice}`;
    } else {
        endpoint = `${API_URL}/device-data/recent`;
    }

    console.log("[Device Data] Fetching from:", endpoint);

    try {
        const res = await fetch(endpoint);
        if (!res.ok) {
            if (res.status === 404) {
                showMessage("No data found");
                return;
            }
            showMessage("Error loading data");
            console.error("[Device Data] Fetch error", res.status, await res.text());
            return;
        }

        const data = await res.json();
        console.log("[Device Data] Response:", data);
        
        const records = data.records || data;

        if (!records || records.length === 0) {
            showMessage("No data found");
            return;
        }

        console.log("[Device Data] Got", records.length, "records");

        tbody.innerHTML = "";
        records.forEach(row => {
            const deviceId = row.Device_ID ?? row.device_id ?? "N/A";
            const battery = row.Battery_Level ?? row.battery_level ?? "N/A";
            const temperature = row.First_Sensor_temperature ?? row.first_sensor_temperature ?? "N/A";
            const routeFrom = row.Route_From ?? row.route_from ?? "N/A";
            const routeTo = row.Route_To ?? row.route_to ?? "N/A";
            const timestamp = formatTimestamp(row.timestamp);

            tbody.innerHTML += `
                <tr>
                    <td>${deviceId}</td>
                    <td>${battery}</td>
                    <td>${temperature}</td>
                    <td>${routeFrom}</td>
                    <td>${routeTo}</td>
                    <td>${timestamp}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.error("[Device Data] Error:", err);
        showMessage("Error loading data: " + err.message);
    }
}

// ------------------------
// FIXED WORKING loadStream() END
// ------------------------
// Handle input submit
document.getElementById("deviceForm").addEventListener("submit", (e) => {
    e.preventDefault();
    selectedDevice = document.getElementById("device_id").value.trim();

    console.log("[Device Data] Device ID entered:", selectedDevice);

    loadStream();

    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(loadStream, 20000);  // 20 seconds
});

// Auto load last 50 on page load
window.addEventListener("load", () => {
    console.log("[Device Data] Page loaded, fetching initial data...");
    
    selectedDevice = "";
    loadStream();

    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(loadStream, 20000); // 20 seconds
});
const token = localStorage.getItem("token");
if (token) {
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    const username = payload.username || payload.sub || "";
    const role = payload.role || "user";

    // Set avatar + username
    document.getElementById("usernameDisplay").textContent = username;
    document.getElementById("userAvatar").textContent = username[0].toUpperCase();

    // Show Admin Panel link only if role is admin
    if (role === "admin") {
      document.getElementById("adminLink").style.display = "flex";
    }

  } catch (e) {
    console.error("Invalid token", e);
  }
}
(function () {
  const token = localStorage.getItem("token");
  if (!token) return;

  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    const username = payload.username || payload.sub || "User";
    const role = (payload.role || "user").toUpperCase();
    const initial = username[0].toUpperCase();

    // Navbar
    document.getElementById("userAvatar").textContent = initial;
    document.getElementById("usernameDisplay").textContent = username;

    // Dropdown header
    document.getElementById("dropAvatar").textContent = initial;
    document.getElementById("dropName").textContent = username;
    document.getElementById("dropUsername").textContent = username;
    document.getElementById("dropRole").textContent = role;

    // Show admin links only for admin
    if (role === "ADMIN") {
      document.getElementById("adminDashLink").style.display = "flex";
      document.getElementById("adminReqLink").style.display = "flex";
      document.getElementById("adminUsersLink").style.display = "flex";
    }

  } catch (e) {
    console.error("Token parse error", e);
  }

  // Toggle dropdown on click
  const wrap = document.getElementById("profileWrap");
  wrap.addEventListener("click", function (e) {
    e.stopPropagation();
    wrap.classList.toggle("open");
  });

  // Close when clicking outside
  document.addEventListener("click", function () {
    wrap.classList.remove("open");
  });
})();
</script>


</body>
</html>
